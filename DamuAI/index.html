<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI5 Hub - Explain Anything Like I'm 5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="emoji">🧠</span>
                <h2>ELI5 Hub</h2>
            </div>
            
            <div class="stats">
                <div class="stat">
                    <span class="stat-value" id="questionCount">0</span>
                    <span class="stat-label">Questions Asked</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="favoriteCount">0</span>
                    <span class="stat-label">Favorites</span>
                </div>
            </div>

            <div class="favorites-section">
                <h3>⭐ Favorites</h3>
                <ul id="favoritesList" class="favorites-list">
                    <li class="empty-fav">No favorites yet</li>
                </ul>
            </div>

            <button id="clearFavoritesBtn" class="clear-favs">Clear All Favorites</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="theme-toggle">
                <button id="themeToggle">🌙 Dark Mode</button>
            </div>

            <header>
                <h1>Explain Like I'm <span class="highlight">5</span></h1>
                <p>Complex topics explained so simply, a 5-year-old would get it</p>
            </header>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="questionInput" 
                        placeholder="Ask anything... e.g., 'How do airplanes fly?' or 'What is climate change?'"
                        rows="3"
                    ></textarea>
                    <div class="input-buttons">
                        <button id="voiceBtn" class="icon-btn" title="Voice input">🎤</button>
                        <button id="clearBtn" class="icon-btn" title="Clear">🗑️</button>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button id="askBtn" class="primary-btn">✨ Explain Like I'm 5</button>
                    <button id="surpriseBtn" class="secondary-btn">🎲 Surprise Me</button>
                </div>
            </div>

            <div id="loadingIndicator" class="loading hidden">
                <div class="spinner"></div>
                <p>Thinking like a 5-year-old...</p>
            </div>

            <div id="resultArea" class="result-area hidden">
                <div class="result-header">
                    <h3>📖 Simple Explanation</h3>
                    <div class="result-actions">
                        <button id="saveFavoriteBtn" class="fav-btn">⭐ Save to Favorites</button>
                        <button id="copyResultBtn" class="copy-btn">📋 Copy</button>
                        <button id="shareBtn" class="share-btn">📤 Share</button>
                    </div>
                </div>
                <div id="explanationResult" class="explanation"></div>
                <div class="question-asked">
                    <strong>You asked:</strong> <span id="askedQuestion"></span>
                </div>
            </div>

            <div class="suggestions">
                <h4>🔥 Try these questions:</h4>
                <div class="suggestion-chips">
                    <button class="chip">How does blockchain work?</button>
                    <button class="chip">What is quantum computing?</button>
                    <button class="chip">How do vaccines work?</button>
                    <button class="chip">What is inflation?</button>
                    <button class="chip">How does ChatGPT work?</button>
                    <button class="chip">Why is the sky blue?</button>
                    <button class="chip">What is DNA?</button>
                    <button class="chip">How do rockets go to space?</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
